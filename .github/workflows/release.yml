name: Build yq for Debian

on:
  workflow_dispatch:
    inputs:
      yq_version:
        description: The version of yq to build (without the leading v).
        type: string
        required: true
      build_version:
        description: The build version.
        type: string
        required: true
      architecture:
        description: Architecture to build (amd64, arm64, armhf, ppc64el, s390x, riscv64, i386, or 'all' for all architectures)
        type: choice
        default: 'all'
        options:
          - 'all'
          - 'amd64'
          - 'arm64'
          - 'armhf'
          - 'ppc64el'
          - 's390x'
          - 'riscv64'
          - 'i386'

permissions:
  contents: write

jobs:
  build-yq:
    name: Build Binary Packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout yq-debian
        uses: actions/checkout@v4

      - name: Build yq
        run: ./build_debian.sh ${{ inputs.yq_version }} ${{ inputs.build_version }} ${{ inputs.architecture }} && ./build_ubuntu.sh ${{ inputs.yq_version }} ${{ inputs.build_version }} ${{ inputs.architecture }}

      - name: Upload Binary Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binary-artifact
          path: yq_*.deb

  build-src:
    name: Build Source Packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout yq-debian
        uses: actions/checkout@v4

      - name: Install dpkg-dev
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends dpkg-dev devscripts wget ca-certificates

      - name: Build source packages
        run: ./build_src.sh ${{ inputs.yq_version }} ${{ inputs.build_version }}

      - name: Upload Source Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: source-artifact
          path: |
            yq_*.dsc
            yq_*.orig.tar.gz
            yq_*.debian.tar.xz

  release-yq:
    name: Release yq for Debian
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [build-yq, build-src]
    steps:
      - name: Download Binary Artifacts
        uses: actions/download-artifact@v4
        with:
          name: binary-artifact

      - name: Download Source Artifacts
        uses: actions/download-artifact@v4
        with:
          name: source-artifact

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          files: |
            yq_*.deb
            yq_*.dsc
            yq_*.orig.tar.gz
            yq_*.debian.tar.xz
          name: ${{ inputs.yq_version }}+${{ inputs.build_version }}
          tag_name: ${{ inputs.yq_version }}+${{ inputs.build_version }}
          fail_on_unmatched_files: true
